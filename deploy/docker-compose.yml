services:
  app:
    image: ghcr.io/baditaflorin/polyglot-nlp-toolkit:latest
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_COMMIT: ${APP_COMMIT:-dev}
      HTTP_ADDR: :8080
      PAGES_ORIGIN: ${PAGES_ORIGIN:-https://baditaflorin.github.io}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
    volumes:
      - model-cache:/models

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "25342:443"
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v3.0.1
    profiles: ["metrics"]
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  model-cache:
  prometheus-data:
